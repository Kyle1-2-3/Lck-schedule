<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LCK Global Schedule — 내 지역 시간 LCK 일정</title>
  <meta name="description" content="원하는 지역 시간으로 보는 LCK 경기 일정과 플레이오프 대진표." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topnav">
      <div class="topnav__brand">LCK · Global</div>
      <label class="region" for="region-select">
        <span class="region__pin" aria-hidden="true">📍</span>
        <select class="region__select" id="region-select" aria-label="지역 선택"></select>
      </label>
      <nav class="tabs">
        <button class="pill-tab is-active" data-tab="schedule" type="button">일정</button>
        <button class="pill-tab" data-tab="bracket" type="button">대진표</button>
      </nav>
    </header>

    <section class="view" id="view-schedule">
      <div class="month-nav">
        <button class="month-nav__btn" id="prev-month" type="button" aria-label="이전 달">‹</button>
        <div class="month-nav__label" id="month-label">—</div>
        <button class="month-nav__btn" id="next-month" type="button" aria-label="다음 달">›</button>
      </div>
      <div id="schedule-body"></div>
    </section>

    <section class="view" id="view-bracket" hidden>
      <div id="bracket-body"></div>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
